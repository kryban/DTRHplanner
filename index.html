<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTRH 2026 Planner</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6b3fa0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DTRH 2026" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }
    body.light { background: #fff; color: #1a1a1a; --bg: #fff; --bg-sec: #f5f5f5; --bg-head: #efefef; --text: #1a1a1a; --text-sec: #666; --border: #e0e0e0; --accent: #6b3fa0; }
    body.dark  { background: #1a1a1a; color: #f0f0f0; --bg: #1a1a1a; --bg-sec: #252525; --bg-head: #2a2a2a; --text: #f0f0f0; --text-sec: #999; --border: #383838; --accent: #9b6fd0; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    button, label.btn { font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg-sec); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: background 0.15s, color 0.15s; font-family: inherit; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:not(:disabled):active, label.btn:active { background: var(--accent); color: #fff; }
    input[type=text]:focus { outline: none; border-color: var(--accent); }
    #app { max-width: 750px; margin: 0 auto; padding: 1rem; }
    #empty { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 2rem; text-align: center; }
    #empty .emoji { font-size: 48px; }
    #save-banner { display: none; margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; background: #fff8e1; border: 1px solid #f5c518; color: #7a6000; font-size: 13px; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    #save-banner button { background: #f5c518; color: #7a6000; border: none; }
    #save-banner button:active { background: #e6b800; color: #7a6000; }
    #header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    #header-meta p { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
    #header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #btn-export.saved { background: #27ae60; color: #fff; }
    #filter-balk { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    #filter-rij2 { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-ster-balk { display: flex; gap: 2px; align-items: center; }
    .filter-ster-balk .ster { font-size: 22px; cursor: pointer; color: #ccc; user-select: none; line-height: 1; transition: color 0.1s; }
    .filter-ster-balk .ster.vol { color: #f5c518; }
    .filter-zoek { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg-sec); color: var(--text); font-family: inherit; width: 130px; }
    .filter-zoek:focus { outline: none; border-color: var(--accent); }
    #tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { font-size: 13px; padding: 6px 16px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg-sec); color: var(--text); font-weight: 400; cursor: pointer; font-family: inherit; }
    .tab.active { background: var(--accent); color: #fff; font-weight: 700; border-color: var(--accent); }
    #timetable { border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    #timetable-header { display: flex; gap: 10px; padding: 8px 12px; background: var(--bg-head); font-size: 12px; color: var(--text-sec); }
    .col-tijd   { min-width: 95px; flex-shrink: 0; }
    .col-podium { min-width: 110px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
    .col-naam   { flex: 1; min-width: 80px; }
    .col-ster   { min-width: 110px; flex-shrink: 0; }
    .col-notitie { flex: 1; min-width: 80px; }
    .sortable   { cursor: pointer; user-select: none; }
    .row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
    .row:last-child { border-bottom: none; }
    .tijd { font-family: monospace; font-size: 11px; color: var(--text-sec); }
    .podium-badge { font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 600; text-align: center; white-space: nowrap; }
    .naam-link { font-weight: 600; font-size: 13px; flex: 1; color: var(--text); text-decoration: none; }
    .naam-link:hover { color: #1db954; }
    .sterren { display: flex; gap: 2px; }
    .ster { font-size: 20px; cursor: pointer; color: #ccc; user-select: none; line-height: 1; transition: color 0.1s; }
    .ster.vol { color: #f5c518; }
    .ster:hover { color: #f5c518; }
    .row-sub { display: flex; align-items: center; gap: 10px; width: 100%; padding-top: 4px; }
    .notitie-tekst { font-size: 12px; color: var(--text-sec); cursor: pointer; min-height: 20px; padding: 4px 0; border-bottom: 1px dashed transparent; flex: 1; }
    .notitie-tekst:hover { border-bottom-color: var(--border); }
    .notitie-tekst.leeg { color: var(--border); font-style: italic; }
    .notitie-input { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 0.5px solid var(--accent); background: var(--bg-sec); color: var(--text); width: 100%; font-family: inherit; }
    .versie { margin-top: 24px; text-align: center; font-size: 11px; color: #888; }
  </style>
</head>
<body class="light">
<div id="app">

  <div id="empty">
    <div class="emoji">🐇</div>
    <h1>Down The Rabbit Hole 2026</h1>
    <p style="font-size:13px; color:var(--text-sec); max-width:360px">
      Laad de <a href="https://www.downtherabbithole.nl/programma" target="_blank" style="color:var(--accent);">DTRH programmering</a> als JSON bestand om te beginnen.
    </p>
    <label class="btn" style="font-size:13px; padding:10px 20px; justify-content:center;">
      📂 Kies bestand (.json)
      <input type="file" id="file-input" accept=".json" style="display:none" />
    </label>
    <div id="fout" style="display:none; padding:10px 16px; border-radius:8px; background:#fde8e8; color:#c0392b; font-size:13px;"></div>
  </div>

  <div id="main" style="display:none">
    <div id="save-banner">
      <span>💾 Nieuwe programmering geladen — druk op Bewaar om op te slaan.</span>
      <button id="btn-banner-bewaar">💾 Bewaar</button>
    </div>
    <div id="header">
      <div id="header-meta">
        <h1>🐇 Down The Rabbit Hole 2026</h1>
        <p id="meta-ingeladen"></p>
        <p id="meta-bijgewerkt"></p>
      </div>
      <div id="header-actions">
        <button id="btn-dark" title="Wissel licht/donker modus">🌙</button>
        <label class="btn">
          📂 Nieuw bestand
          <input type="file" id="file-nieuw" accept=".json" style="display:none" />
        </label>
        <button id="btn-export">📤 Exporteer</button>
        <!-- TESTKNOP - verwijderen na testen -->
        <button id="btn-testweer" style="background:var(--bg-sec); color:var(--text-sec); border:0.5px solid var(--border);">🌦 Testweer</button>
      </div>
    </div>
    <div id="filter-balk"></div>
    <div id="filter-rij2"></div>
    <div id="tabs"></div>
    <div id="timetable">
      <div id="timetable-header">
        <span class="col-tijd sortable" data-kolom="tijd">Tijd <span id="icon-tijd">↕</span></span>
        <span class="col-podium sortable" data-kolom="podium">Podium <span id="icon-podium">↕</span></span>
        <span class="col-naam"></span>
      </div>
      <div id="timetable-body"></div>
    </div>
    <p style="font-size:11px; color:var(--text-sec); margin-top:10px;">Wijzigingen worden automatisch opgeslagen. Gebruik "Exporteer" voor een backup.</p>
    <div class="versie">v1.0.0</div>
  </div>
</div>

<script>
// ── Data normalisatie ─────────────────────────────────────────────────────────
function normaliseerDTRH(json, bestaandeData) {
  var bestaandMap = {};
  if (bestaandeData) {
    for (var d = 0; d < bestaandeData.dagen.length; d++) {
      for (var a = 0; a < bestaandeData.dagen[d].acts.length; a++) {
        var act = bestaandeData.dagen[d].acts[a];
        var k = act.datum+"|"+act.start+"|"+act.artiest;
        bestaandMap[k] = act;
      }
    }
  }
  var now = new Date().toISOString();
  var dagen = [];
  for (var d = 0; d < json.dagen.length; d++) {
    var dag = json.dagen[d];
    var acts = [];
    for (var a = 0; a < dag.acts.length; a++) {
      var act = dag.acts[a];
      // sanity check velden
      var start = (act.start || "").toString().trim();
      var einde = (act.einde || "").toString().trim();
      var artiest = (act.artiest || "").trim();
      var podium  = (act.podium  || "").trim();
      if (!artiest || !start) continue;
      var key = dag.datum+"|"+start+"|"+artiest;
      var beoordeling = null, notitie = "";
      if (bestaandMap[key]) { beoordeling = bestaandMap[key].beoordeling; notitie = bestaandMap[key].notitie || ""; }
      acts.push({ datum: dag.datum, dagSleutel: dag.dag.toLowerCase(), podium: podium, artiest: artiest, start: start, einde: einde, beoordeling: beoordeling, notitie: notitie });
    }
    acts.sort(function(a,b) { return a.start < b.start ? -1 : a.start > b.start ? 1 : 0; });
    dagen.push({ dag: dag.dag, datum: dag.datum, acts: acts });
  }
  return {
    festival: json.festival || "DTRH 2026",
    ingeladenOp: bestaandeData ? bestaandeData.ingeladenOp : now,
    bijgewerktOp: now,
    dagen: dagen
  };
}

// ── Weer ──────────────────────────────────────────────────────────────────────
var weerData = {};
var testWeerActief = false;

function haalWeerOp(dagen) {
  if (!dagen || !dagen.length) return;
  var datums = dagen.map(function(d) { return d.datum; }).filter(Boolean);
  if (!datums.length) return;
  datums.sort();
  var url = "https://api.open-meteo.com/v1/forecast?latitude=51.87&longitude=5.73&hourly=precipitation,cloudcover&timezone=Europe%2FAmsterdam&start_date="+datums[0]+"&end_date="+datums[datums.length-1];
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      var times = json.hourly.time, precip = json.hourly.precipitation, cloud = json.hourly.cloudcover;
      for (var i = 0; i < times.length; i++) weerData[times[i]] = { precipitation: precip[i], cloudcover: cloud[i] };
      if (data) renderTimetable();
    })
    .catch(function() {});
}

function toggleTestWeer() {
  testWeerActief = !testWeerActief;
  var btn = document.getElementById("btn-testweer");
  if (testWeerActief) {
    var types = [
      { precipitation: 0, cloudcover: 10 },
      { precipitation: 0, cloudcover: 60 },
      { precipitation: 0.8, cloudcover: 80 },
      { precipitation: 3.5, cloudcover: 90 }
    ];
    var dagDatums = ["2026-07-03","2026-07-04","2026-07-05"];
    for (var d = 0; d < dagDatums.length; d++) {
      for (var u = 0; u < 24; u++) {
        var key = dagDatums[d]+"T"+(u<10?"0":"")+u+":00";
        weerData[key] = types[(d*8+u)%4];
      }
    }
    btn.style.background = "#f5c518"; btn.style.color = "#7a6000"; btn.style.border = "none";
  } else {
    weerData = {};
    btn.style.background = "var(--bg-sec)"; btn.style.color = "var(--text-sec)"; btn.style.border = "0.5px solid var(--border)";
  }
  if (data) renderTimetable();
}

function berekenWeer(datum, start, einde) {
  if (!datum || !start) return null;
  var beginUur = parseInt(start.split(":")[0]);
  var eindUur  = parseInt((einde||start).split(":")[0]);
  if (isNaN(beginUur)) return null;
  if (isNaN(eindUur) || eindUur < beginUur) eindUur = beginUur + 1;
  var totalePrecip = 0, totalCloud = 0, count = 0;
  for (var u = beginUur; u <= eindUur; u++) {
    var uur = u % 24;
    var d = new Date(datum);
    if (u >= 24) d.setDate(d.getDate()+1);
    var dagStr = d.toISOString().slice(0,10);
    var key = dagStr+"T"+(uur<10?"0":"")+uur+":00";
    if (weerData[key] !== undefined) { totalePrecip += weerData[key].precipitation; totalCloud += weerData[key].cloudcover; count++; }
  }
  if (count === 0) return null;
  var gemCloud = totalCloud / count;
  if (totalePrecip === 0 && gemCloud < 30) return "zon";
  if (totalePrecip === 0)                  return "bewolkt";
  if (totalePrecip < 2)                    return "licht";
  return "zwaar";
}

function maakWeerIcoon(type) {
  if (type === "zon")     { var s = document.createElement("span"); s.textContent = "☀️"; s.style.fontSize = "16px"; return s; }
  if (type === "bewolkt") { var s = document.createElement("span"); s.textContent = "⛅"; s.style.fontSize = "16px"; return s; }
  var svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.style.display = "inline-block"; svg.style.verticalAlign = "middle";
  if (type === "licht") {
    svg.setAttribute("width","16"); svg.setAttribute("height","18"); svg.setAttribute("viewBox","0 0 18 20");
    var path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d","M9 1 C9 1 2 9 2 13.5 C2 17.09 5.13 20 9 20 C12.87 20 16 17.09 16 13.5 C16 9 9 1 9 1Z");
    path.setAttribute("fill","#4a90e8"); svg.appendChild(path);
  } else {
    svg.setAttribute("width","24"); svg.setAttribute("height","18"); svg.setAttribute("viewBox","0 0 26 20");
    var p1 = document.createElementNS("http://www.w3.org/2000/svg","path");
    p1.setAttribute("d","M8 1 C8 1 2 8.5 2 12.5 C2 15.81 4.69 18.5 8 18.5 C11.31 18.5 14 15.81 14 12.5 C14 8.5 8 1 8 1Z");
    p1.setAttribute("fill","#4a90e8"); p1.setAttribute("opacity","0.55");
    var p2 = document.createElementNS("http://www.w3.org/2000/svg","path");
    p2.setAttribute("d","M18 1 C18 1 12 8.5 12 12.5 C12 15.81 14.69 18.5 18 18.5 C21.31 18.5 24 15.81 24 12.5 C24 8.5 18 1 18 1Z");
    p2.setAttribute("fill","#4a90e8"); svg.appendChild(p1); svg.appendChild(p2);
  }
  return svg;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
var PODIUM_KLEUREN = {
  "Hotot":             "#e8534a",
  "Teddy Widder":      "#4a90e8",
  "Fuzzy Lop":         "#27ae60",
  "Rex":               "#e8a84a",
  "The Bizarre":       "#9b59b6",
  "Bossa Nova":        "#e84a90",
  "The Croque Madame": "#1abc9c",
  "Holding":           "#e87a4a",
  "Radiate VI":        "#3498db",
  "Idyllische Veldje": "#7dbb4a"
};

var LS_DATA_KEY = "dtrh_data";
var LS_DARK_KEY = "dtrh_dark";

function fmtDatum(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString("nl-NL", { day:"numeric", month:"long", year:"numeric", hour:"2-digit", minute:"2-digit" });
}
function ddmmyyyy(d) {
  d = d || new Date();
  return ("0"+d.getDate()).slice(-2)+("0"+(d.getMonth()+1)).slice(-2)+d.getFullYear();
}
function slaOpInStorage() { try { localStorage.setItem(LS_DATA_KEY, JSON.stringify(data)); } catch(e) {} }
function downloadJson(naam) {
  var blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url = URL.createObjectURL(blob), a = document.createElement("a");
  a.href=url; a.download=naam||"dtrh-backup.json";
  document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}

// ── State ─────────────────────────────────────────────────────────────────────
var data = null, actieveDag = 0, opslaanNaam = null, filterMin = 0, filterWoord = "";
var sortKolom = "tijd", sortRichting = "asc", darkMode = false;

// ── UI refs ───────────────────────────────────────────────────────────────────
var $empty      = document.getElementById("empty");
var $main       = document.getElementById("main");
var $fout       = document.getElementById("fout");
var $tabs       = document.getElementById("tabs");
var $body       = document.getElementById("timetable-body");
var $banner     = document.getElementById("save-banner");
var $btnBannerB = document.getElementById("btn-banner-bewaar");
var $btnExport  = document.getElementById("btn-export");
var $btnDark    = document.getElementById("btn-dark");
var $metaIn     = document.getElementById("meta-ingeladen");
var $metaBij    = document.getElementById("meta-bijgewerkt");
var $filterBalk = document.getElementById("filter-balk");
var $filterRij2 = document.getElementById("filter-rij2");

// ── Init ──────────────────────────────────────────────────────────────────────
darkMode = localStorage.getItem(LS_DARK_KEY) === "true";
if (darkMode) { document.body.className = "dark"; $btnDark.textContent = "☀️"; }

var opgeslagen = localStorage.getItem(LS_DATA_KEY);
if (opgeslagen) {
  try { var json = JSON.parse(opgeslagen); if (json && json.dagen) { data = json; laadData(json, false); haalWeerOp(json.dagen); } } catch(e) {}
}

document.getElementById("btn-testweer").addEventListener("click", toggleTestWeer);

// ── Bestand verwerken ─────────────────────────────────────────────────────────
function verwerkBestand(file) {
  $fout.style.display = "none";
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var raw = JSON.parse(ev.target.result);
      if (!raw || !raw.dagen) throw new Error("Geen geldige DTRH JSON.");
      var json = normaliseerDTRH(raw, data);
      if (!json.dagen.length) throw new Error("Geen acts gevonden in de JSON.");
      laadData(json, true);
      slaOpInStorage();
      haalWeerOp(json.dagen);
    } catch(e) { $fout.style.display="block"; $fout.textContent=e.message; }
  };
  reader.onerror = function() { $fout.style.display="block"; $fout.textContent="Fout bij inlezen."; };
  reader.readAsText(file);
}

["file-input","file-nieuw"].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener("change", function(e) { if (e.target.files[0]) verwerkBestand(e.target.files[0]); });
});

// ── Laad data ─────────────────────────────────────────────────────────────────
function laadData(json, toonBanner) {
  data = json;
  actieveDag = 0; filterMin = 0; filterWoord = "";
  opslaanNaam = toonBanner ? ("DTRHplanner-ingeladen-"+ddmmyyyy()+".json") : null;
  $empty.style.display = "none"; $main.style.display = "block";
  renderHeader(); renderBanner(); renderFilter(); renderTabs(); renderTimetable();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderHeader() {
  $metaIn.textContent  = "Programmering ingeladen op " + fmtDatum(data.ingeladenOp);
  $metaBij.textContent = "Laatst bijgewerkt op " + fmtDatum(data.bijgewerktOp);
}

function renderBanner() { $banner.style.display = opslaanNaam ? "flex" : "none"; }

function renderFilter() {
  $filterBalk.innerHTML = "";
  var lbl = document.createElement("span"); lbl.style.cssText = "font-size:12px;color:var(--text-sec);"; lbl.textContent = "Toon minimaal";
  $filterBalk.appendChild(lbl);
  var balk = document.createElement("div"); balk.className = "filter-ster-balk";
  for (var s = 1; s <= 5; s++) {
    (function(s) {
      var ster = document.createElement("span");
      ster.className = "ster"+(filterMin>=s?" vol":""); ster.textContent = filterMin>=s?"★":"☆";
      ster.addEventListener("click", function() { filterMin = filterMin===s?0:s; renderFilter(); renderTimetable(); });
      balk.appendChild(ster);
    })(s);
  }
  $filterBalk.appendChild(balk);
  $filterRij2.innerHTML = "";
  var lbl2 = document.createElement("span"); lbl2.style.cssText = "font-size:12px;color:var(--text-sec);"; lbl2.textContent = "Commentaar bevat";
  $filterRij2.appendChild(lbl2);
  var zoek = document.createElement("input"); zoek.type="text"; zoek.className="filter-zoek"; zoek.placeholder="Zoekwoord..."; zoek.value=filterWoord;
  zoek.addEventListener("blur", function() { filterWoord=zoek.value.trim().toLowerCase(); renderTimetable(); });
  zoek.addEventListener("keydown", function(e) { if(e.key==="Enter") zoek.blur(); });
  $filterRij2.appendChild(zoek);
}

function renderTabs() {
  $tabs.innerHTML = "";
  for (var i = 0; i < data.dagen.length; i++) {
    (function(i) {
      var d = data.dagen[i];
      var btn = document.createElement("button"); btn.className="tab"+(i===actieveDag?" active":"");
      btn.innerHTML = d.dag+' <span style="opacity:.6;font-size:11px">('+d.acts.length+')</span>';
      btn.addEventListener("click", function() { actieveDag=i; renderTabs(); renderTimetable(); });
      $tabs.appendChild(btn);
    })(i);
  }
}

function renderTimetable() {
  $body.innerHTML = "";
  ["tijd","podium"].forEach(function(k) {
    var ic = document.getElementById("icon-"+k); if (!ic) return;
    ic.textContent = sortKolom===k?(sortRichting==="asc"?"↑":"↓"):"↕";
    ic.style.opacity = sortKolom===k?"1":"0.3";
  });

  var dag = data.dagen[actieveDag];
  var indices = [];
  for (var i = 0; i < dag.acts.length; i++) {
    var a = dag.acts[i];
    var heeftSter = filterMin>0, heeftWoord = filterWoord!=="";
    var toon;
    if (!heeftSter && !heeftWoord) toon=true;
    else if (heeftSter && heeftWoord) toon=(a.beoordeling||0)>=filterMin||(a.notitie||"").toLowerCase().indexOf(filterWoord)!==-1;
    else if (heeftSter) toon=(a.beoordeling||0)>=filterMin;
    else toon=(a.notitie||"").toLowerCase().indexOf(filterWoord)!==-1;
    if (toon) indices.push(i);
  }
  indices.sort(function(ia,ib) {
    var a=dag.acts[ia],b=dag.acts[ib], va,vb;
    if (sortKolom==="tijd")        { va=a.start;  vb=b.start; }
    else if (sortKolom==="podium") { va=a.podium; vb=b.podium; }
    else                           { va=a.beoordeling||0; vb=b.beoordeling||0; }
    if (va<vb) return sortRichting==="asc"?-1:1;
    if (va>vb) return sortRichting==="asc"?1:-1;
    return 0;
  });

  for (var ii = 0; ii < indices.length; ii++) {
    (function(actIdx) {
      var act = dag.acts[actIdx];
      var kleur = PODIUM_KLEUREN[act.podium] || "#888";
      var row = document.createElement("div"); row.className="row";

      var tijd = document.createElement("span"); tijd.className="col-tijd tijd";
      tijd.textContent = act.start + (act.einde ? " – "+act.einde : "");

      var badge = document.createElement("span"); badge.className="podium-badge";
      badge.style.background=kleur+"33"; badge.style.color=kleur; badge.textContent=act.podium;
      var podiumWrap = document.createElement("span"); podiumWrap.className="col-podium";
      podiumWrap.appendChild(badge);

      var weerType = berekenWeer(act.datum, act.start, act.einde);
      if (weerType) {
        var icoon = maakWeerIcoon(weerType);
        var wlink = document.createElement("a");
        wlink.href="https://www.buienradar.nl/weer/beuningen/nl/2758912";
        wlink.target="_blank"; wlink.rel="noopener noreferrer";
        wlink.style.cssText="display:inline-flex;align-items:center;text-decoration:none;line-height:1;";
        wlink.title=weerType==="zon"?"Zonnig":weerType==="bewolkt"?"Bewolkt":weerType==="licht"?"Lichte regen":"Flinke regen";
        wlink.appendChild(icoon); podiumWrap.appendChild(wlink);
      }

      var naam = document.createElement("a"); naam.className="naam-link col-naam";
      naam.textContent=act.artiest;
      naam.href="https://open.spotify.com/search/"+encodeURIComponent(act.artiest);
      naam.target="_blank"; naam.rel="noopener noreferrer";

      var sterren = document.createElement("div"); sterren.className="sterren col-ster";
      for (var s=1;s<=5;s++) {
        (function(s) {
          var ster = document.createElement("span");
          ster.className="ster"+(act.beoordeling>=s?" vol":""); ster.textContent=act.beoordeling>=s?"★":"☆";
          ster.addEventListener("click", function() {
            dag.acts[actIdx].beoordeling = dag.acts[actIdx].beoordeling===s?null:s;
            data.bijgewerktOp=new Date().toISOString();
            slaOpInStorage(); renderHeader(); renderTimetable();
          });
          sterren.appendChild(ster);
        })(s);
      }

      var notitieWrap = document.createElement("div"); notitieWrap.className="col-notitie";
      var notitieSpan = document.createElement("span");
      notitieSpan.className="notitie-tekst"+(act.notitie?"":" leeg");
      notitieSpan.textContent=act.notitie||"Notitie...";
      var notitieInput = document.createElement("input");
      notitieInput.type="text"; notitieInput.className="notitie-input";
      notitieInput.maxLength=35; notitieInput.value=act.notitie; notitieInput.style.display="none";
      notitieSpan.addEventListener("click", function() { notitieSpan.style.display="none"; notitieInput.style.display="block"; notitieInput.focus(); });
      notitieInput.addEventListener("blur", function() {
        dag.acts[actIdx].notitie=notitieInput.value; data.bijgewerktOp=new Date().toISOString();
        slaOpInStorage(); renderHeader();
        notitieSpan.textContent=notitieInput.value||"Notitie...";
        notitieSpan.className="notitie-tekst"+(notitieInput.value?"":" leeg");
        notitieInput.style.display="none"; notitieSpan.style.display="";
      });
      notitieInput.addEventListener("keydown", function(e) { if(e.key==="Enter") notitieInput.blur(); });
      notitieWrap.appendChild(notitieSpan); notitieWrap.appendChild(notitieInput);

      var rowSub = document.createElement("div"); rowSub.className="row-sub";
      rowSub.appendChild(sterren); rowSub.appendChild(notitieWrap);

      row.appendChild(tijd); row.appendChild(podiumWrap); row.appendChild(naam); row.appendChild(rowSub);
      $body.appendChild(row);
    })(indices[ii]);
  }
}

// ── Knoppen ───────────────────────────────────────────────────────────────────
$btnBannerB.addEventListener("click", function() { slaOpInStorage(); opslaanNaam=null; renderBanner(); });
$btnExport.addEventListener("click", function() {
  downloadJson("DTRHplanner-backup-"+ddmmyyyy()+".json");
  $btnExport.textContent="✓ Geëxporteerd!"; $btnExport.classList.add("saved");
  setTimeout(function(){$btnExport.textContent="📤 Exporteer";$btnExport.classList.remove("saved");},2000);
});
$btnDark.addEventListener("click", function() {
  darkMode=!darkMode; document.body.className=darkMode?"dark":"light";
  $btnDark.textContent=darkMode?"☀️":"🌙"; localStorage.setItem(LS_DARK_KEY,darkMode);
});
document.querySelectorAll(".sortable").forEach(function(el) {
  el.addEventListener("click", function() {
    var k=el.dataset.kolom;
    if (sortKolom===k) sortRichting=sortRichting==="asc"?"desc":"asc";
    else { sortKolom=k; sortRichting="asc"; }
    renderTimetable();
  });
});
</script>
</body>
