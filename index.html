  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }
    body.light { background: #fff; color: #1a1a1a; --bg: #fff; --bg-sec: #f5f5f5; --bg-head: #efefef; --text: #1a1a1a; --text-sec: #666; --border: #e0e0e0; --accent: #6b3fa0; }
    body.dark  { background: #1a1a1a; color: #f0f0f0; --bg: #1a1a1a; --bg-sec: #252525; --bg-head: #2a2a2a; --text: #f0f0f0; --text-sec: #999; --border: #383838; --accent: #9b6fd0; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    button, label.btn { font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg-sec); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: background 0.15s, color 0.15s; font-family: inherit; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:not(:disabled):active, label.btn:active { background: var(--accent); color: #fff; }
    input[type=text]:focus { outline: none; border-color: var(--accent); }
    #app { max-width: 750px; margin: 0 auto; padding: 1rem; }
    #header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    #header-meta p { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
    #header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #btn-export.saved { background: #27ae60; color: #fff; }
    #filter-balk { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    #filter-rij2 { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-ster-balk { display: flex; gap: 2px; align-items: center; }
    .filter-ster-balk .ster { font-size: 22px; cursor: pointer; color: #ccc; user-select: none; line-height: 1; transition: color 0.1s; }
    .filter-ster-balk .ster.vol { color: #f5c518; }
    .filter-zoek { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg-sec); color: var(--text); font-family: inherit; width: 130px; }
    .filter-zoek:focus { outline: none; border-color: var(--accent); }
    #tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { font-size: 13px; padding: 6px 16px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg-sec); color: var(--text); font-weight: 400; cursor: pointer; font-family: inherit; }
    .tab.active { background: var(--accent); color: #fff; font-weight: 700; border-color: var(--accent); }
    #timetable { border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    #timetable-header { display: flex; gap: 10px; padding: 8px 12px; background: var(--bg-head); font-size: 12px; color: var(--text-sec); }
    .col-tijd   { min-width: 95px; flex-shrink: 0; }
    .col-podium { min-width: 110px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
    .col-naam   { flex: 1; min-width: 80px; }
    .col-ster   { min-width: 110px; flex-shrink: 0; }
    .col-notitie { flex: 1; min-width: 80px; }
    .sortable   { cursor: pointer; user-select: none; }
    .row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
    .row:last-child { border-bottom: none; }
    .tijd { font-family: monospace; font-size: 11px; color: var(--text-sec); }
    .podium-badge { font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 600; text-align: center; white-space: nowrap; }
    .naam-link { font-weight: 600; font-size: 13px; flex: 1; color: var(--text); text-decoration: none; }
    .naam-link:hover { color: #1db954; }
    .sterren { display: flex; gap: 2px; }
    .ster { font-size: 20px; cursor: pointer; color: #ccc; user-select: none; line-height: 1; transition: color 0.1s; }
    .ster.vol { color: #f5c518; }
    .ster:hover { color: #f5c518; }
    .row-sub { display: flex; align-items: center; gap: 10px; width: 100%; padding-top: 4px; }
    .notitie-tekst { font-size: 12px; color: var(--text-sec); cursor: pointer; min-height: 20px; padding: 4px 0; border-bottom: 1px dashed transparent; flex: 1; }
    .notitie-tekst:hover { border-bottom-color: var(--border); }
    .notitie-tekst.leeg { color: var(--border); font-style: italic; }
    .notitie-input { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 0.5px solid var(--accent); background: var(--bg-sec); color: var(--text); width: 100%; font-family: inherit; }
    .versie { margin-top: 24px; text-align: center; font-size: 11px; color: #888; }
  </style>
</head>

<script>
function tijdNaarSorteerwaarde(tijdStr) {
  if (!tijdStr) return 0;
  var uur = parseInt(tijdStr.split(":")[0]);
  if (isNaN(uur)) return 0;
  if (uur < 6) uur += 24;
  return uur * 60 + parseInt((tijdStr.split(":")[1]||"0"));
}

// ── Data normalisatie ─────────────────────────────────────────────────────────
function normaliseerDTRH(raw, bestaandeData) {
  var bestaandMap = {};
  if (bestaandeData) {
    for (var d = 0; d < bestaandeData.dagen.length; d++) {
      for (var a = 0; a < bestaandeData.dagen[d].acts.length; a++) {
        var act = bestaandeData.dagen[d].acts[a];
        bestaandMap[act.datum+"|"+act.start+"|"+act.artiest] = act;
      }
    }
  }
  var now = new Date().toISOString();
  var dagen = [];
  for (var d = 0; d < raw.dagen.length; d++) {
    var dag = raw.dagen[d];
    var acts = [];
    for (var a = 0; a < dag.acts.length; a++) {
      var act = dag.acts[a];
      var start = (act.start||"").toString().trim();
      var einde = (act.einde||"").toString().trim();
      var artiest = (act.artiest||"").trim();
      var podium  = (act.podium||"").trim();
      if (!artiest || !start) continue;
      var key = dag.datum+"|"+start+"|"+artiest;
      var beoordeling = null, notitie = "";
      if (bestaandMap[key]) { beoordeling = bestaandMap[key].beoordeling; notitie = bestaandMap[key].notitie||""; }
      acts.push({ datum: dag.datum, dagSleutel: dag.dag.toLowerCase(), podium: podium, artiest: artiest, start: start, einde: einde, beoordeling: beoordeling, notitie: notitie });
    }
    acts.sort(function(a,b) { return tijdNaarSorteerwaarde(a.start)-tijdNaarSorteerwaarde(b.start); });
    dagen.push({ dag: dag.dag, datum: dag.datum, acts: acts });
  }
  return { festival: raw.festival||"DTRH 2026", ingeladenOp: bestaandeData?bestaandeData.ingeladenOp:now, bijgewerktOp: now, dagen: dagen };
}

var weerData = {}, testWeerActief = false;

function haalWeerOp(dagen) {
  if (!dagen||!dagen.length) return;
  var datums = dagen.map(function(d){return d.datum;}).filter(Boolean).sort();
  if (!datums.length) return;
  fetch("https://api.open-meteo.com/v1/forecast?latitude=51.87&longitude=5.73&hourly=precipitation,cloudcover&timezone=Europe%2FAmsterdam&start_date="+datums[0]+"&end_date="+datums[datums.length-1])
    .then(function(r){return r.json();})
    .then(function(json){
      var times=json.hourly.time,precip=json.hourly.precipitation,cloud=json.hourly.cloudcover;
      for(var i=0;i<times.length;i++) weerData[times[i]]={precipitation:precip[i],cloudcover:cloud[i]};
      if(data) renderTimetable();
    }).catch(function(){});
}

function toggleTestWeer() {
  testWeerActief = !testWeerActief;
  var btn = document.getElementById("btn-testweer");

      for(var u=0;u<24;u++){var key=datum+"T"+(u<10?"0":"")+u+":00";weerData[key]=types[(d*8+u)%4];}
    });

  } else {
    weerData={};

  }

function berekenWeer(datum,start,einde) {
  if(!datum||!start) return null;
  var beginUur=parseInt(start.split(":")[0]);
  var eindUur=parseInt((einde||start).split(":")[0]);
  if(isNaN(beginUur)) return null;
  if(isNaN(eindUur)||eindUur<beginUur) eindUur=beginUur+1;
  var totalePrecip=0,totalCloud=0,count=0;
  for(var u=beginUur;u<=eindUur;u++){
    var uur=u%24, d=new Date(datum);
    if(u>=24) d.setDate(d.getDate()+1);
    var key=d.toISOString().slice(0,10)+"T"+(uur<10?"0":"")+uur+":00";
    if(weerData[key]!==undefined){totalePrecip+=weerData[key].precipitation;totalCloud+=weerData[key].cloudcover;count++;}
  }
  if(count===0) return null;
  var gemCloud=totalCloud/count;
  if(totalePrecip===0&&gemCloud<30) return "zon";
  if(totalePrecip===0) return "bewolkt";
  if(totalePrecip<2) return "licht";
  return "zwaar";
}

  indices.sort(function(ia,ib){
    var a=dag.acts[ia],b=dag.acts[ib],va,vb;
    if(sortKolom==="tijd"){va=tijdNaarSorteerwaarde(a.start);vb=tijdNaarSorteerwaarde(b.start);}
    else if(sortKolom==="podium"){va=a.podium;vb=b.podium;}
    else{va=a.beoordeling||0;vb=b.beoordeling||0;}
    if(va<vb)return sortRichting==="asc"?-1:1;
    if(va>vb)return sortRichting==="asc"?1:-1;
    return 0;
  });
  for(var ii=0;ii<indices.length;ii++){
    (function(actIdx){
      var act=dag.acts[actIdx];
      var kleur=PODIUM_KLEUREN[act.podium]||"#888";
      var row=document.createElement("div");row.className="row";
      var tijd=document.createElement("span");tijd.className="col-tijd tijd";
      tijd.textContent=act.start+(act.einde?" – "+act.einde:"");
      var badge=document.createElement("span");badge.className="podium-badge";
      badge.style.background=kleur+"33";badge.style.color=kleur;badge.textContent=act.podium;
      var podiumWrap=document.createElement("span");podiumWrap.className="col-podium";
      podiumWrap.appendChild(badge);
      var weerType=berekenWeer(act.datum,act.start,act.einde);
      if(weerType){
        var icoon=maakWeerIcoon(weerType);
        var wlink=document.createElement("a");
        wlink.href="https://www.buienradar.nl/weer/beuningen/nl/2758912";
        wlink.target="_blank";wlink.rel="noopener noreferrer";
        wlink.style.cssText="display:inline-flex;align-items:center;text-decoration:none;line-height:1;";
        wlink.title=weerType==="zon"?"Zonnig":weerType==="bewolkt"?"Bewolkt":weerType==="licht"?"Lichte regen":"Flinke regen";
        wlink.appendChild(icoon);podiumWrap.appendChild(wlink);
      }
      var naam=document.createElement("a");naam.className="naam-link col-naam";
      naam.textContent=act.artiest;
      naam.href="https://open.spotify.com/search/"+encodeURIComponent(act.artiest);
      naam.target="_blank";naam.rel="noopener noreferrer";
      var sterren=document.createElement("div");sterren.className="sterren col-ster";
      for(var s=1;s<=5;s++){
        (function(s){
          var ster=document.createElement("span");
          ster.className="ster"+(act.beoordeling>=s?" vol":"");ster.textContent=act.beoordeling>=s?"★":"☆";
          ster.addEventListener("click",function(){
            dag.acts[actIdx].beoordeling=dag.acts[actIdx].beoordeling===s?null:s;
            data.bijgewerktOp=new Date().toISOString();
            slaOpInStorage();renderHeader();renderTimetable();
          });
          sterren.appendChild(ster);
        })(s);
      }
      var notitieWrap=document.createElement("div");notitieWrap.className="col-notitie";
      var notitieSpan=document.createElement("span");
      notitieSpan.className="notitie-tekst"+(act.notitie?"":" leeg");
      notitieSpan.textContent=act.notitie||"Notitie...";
      var notitieInput=document.createElement("input");
      notitieInput.type="text";notitieInput.className="notitie-input";
      notitieInput.maxLength=35;notitieInput.value=act.notitie;notitieInput.style.display="none";
      notitieSpan.addEventListener("click",function(){notitieSpan.style.display="none";notitieInput.style.display="block";notitieInput.focus();});
      notitieInput.addEventListener("blur",function(){
        dag.acts[actIdx].notitie=notitieInput.value;data.bijgewerktOp=new Date().toISOString();
        slaOpInStorage();renderHeader();
        notitieSpan.textContent=notitieInput.value||"Notitie...";
        notitieSpan.className="notitie-tekst"+(notitieInput.value?"":" leeg");
        notitieInput.style.display="none";notitieSpan.style.display="";
      });
      notitieInput.addEventListener("keydown",function(e){if(e.key==="Enter")notitieInput.blur();});
      notitieWrap.appendChild(notitieSpan);notitieWrap.appendChild(notitieInput);
      var rowSub=document.createElement("div");rowSub.className="row-sub";
      rowSub.appendChild(sterren);rowSub.appendChild(notitieWrap);
      row.appendChild(tijd);row.appendChild(podiumWrap);row.appendChild(naam);row.appendChild(rowSub);
      $body.appendChild(row);
    })(indices[ii]);
  }
}

// ── Knoppen ───────────────────────────────────────────────────────────────────
$btnExport.addEventListener("click",function(){
  downloadJson("DTRHplanner-backup-"+ddmmyyyy()+".json");
  $btnExport.textContent="✓ Geëxporteerd!";$btnExport.classList.add("saved");
  setTimeout(function(){$btnExport.textContent="📤 Exporteer";$btnExport.classList.remove("saved");},2000);
});
$btnDark.addEventListener("click",function(){
  darkMode=!darkMode;document.body.className=darkMode?"dark":"light";
  $btnDark.textContent=darkMode?"☀️":"🌙";localStorage.setItem(LS_DARK_KEY,darkMode);
});
document.querySelectorAll(".sortable").forEach(function(el){
  el.addEventListener("click",function(){
    var k=el.dataset.kolom;
    if(sortKolom===k)sortRichting=sortRichting==="asc"?"desc":"asc";
    else{sortKolom=k;sortRichting="asc";}
    renderTimetable();
  });
});
</script>
</body>
