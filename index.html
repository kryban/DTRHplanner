    .col-notitie { flex: 1; min-width: 80px; }
    .sortable { cursor: pointer; user-select: none; }
    .row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
    .row:last-child { border-bottom: none; }

// ── Tijdsortering ─────────────────────────────────────────────────────────────
function tijdSort(t) {
  if (!t) return 0;
  var parts = t.split(":");
  var u = parseInt(parts[0]), m = parseInt(parts[1]||"0");
  if (isNaN(u)) return 0;
  if (u < 6) u += 24;
  return u * 60 + m;
}

// ── Data normalisatie ─────────────────────────────────────────────────────────
function normaliseer(raw, bestaand) {
  var map = {};
  if (bestaand) {
    for (var d = 0; d < bestaand.dagen.length; d++) {
      for (var a = 0; a < bestaand.dagen[d].acts.length; a++) {
        var x = bestaand.dagen[d].acts[a];
        map[x.datum+"|"+x.start+"|"+x.artiest] = x;
      }
    }
  }
  var now = new Date().toISOString();
  var dagen = [];
  for (var d = 0; d < raw.dagen.length; d++) {
    var dag = raw.dagen[d];
    var acts = [];
    for (var a = 0; a < dag.acts.length; a++) {
      var act = dag.acts[a];
      var start = (act.start||"").toString().trim();
      var einde = (act.einde||"").toString().trim();
      var artiest = (act.artiest||"").trim();
      var podium  = (act.podium||"").trim();
      if (!artiest || !start) continue;
      var key = dag.datum+"|"+start+"|"+artiest;
      var beoordeling = null, notitie = "";
      if (map[key]) { beoordeling = map[key].beoordeling; notitie = map[key].notitie||""; }
      acts.push({ datum:dag.datum, dagSleutel:dag.dag.toLowerCase(), podium:podium, artiest:artiest, start:start, einde:einde, beoordeling:beoordeling, notitie:notitie });
    }
    acts.sort(function(a,b) { return tijdSort(a.start) - tijdSort(b.start); });
    dagen.push({ dag:dag.dag, datum:dag.datum, acts:acts });
  }
  return { festival:raw.festival||"DTRH 2026", ingeladenOp:bestaand?bestaand.ingeladenOp:now, bijgewerktOp:now, dagen:dagen };
}

// ── Weer ──────────────────────────────────────────────────────────────────────
var weerData = {}, testWeerActief = false;

function haalWeerOp(dagen) {
  var datums = [];
  for (var i = 0; i < dagen.length; i++) { if (dagen[i].datum) datums.push(dagen[i].datum); }
  if (!datums.length) return;
  datums.sort();
  fetch("https://api.open-meteo.com/v1/forecast?latitude=51.87&longitude=5.73&hourly=precipitation,cloudcover&timezone=Europe%2FAmsterdam&start_date="+datums[0]+"&end_date="+datums[datums.length-1])
    .then(function(r){return r.json();})
    .then(function(json){
      for (var i=0;i<json.hourly.time.length;i++) weerData[json.hourly.time[i]]={precipitation:json.hourly.precipitation[i],cloudcover:json.hourly.cloudcover[i]};
      if (data) renderTimetable();
    }).catch(function(){});
}

function toggleTestWeer() {
  testWeerActief = !testWeerActief;
  var btn = document.getElementById("btn-testweer");
  if (testWeerActief) {
    var types=[{precipitation:0,cloudcover:10},{precipitation:0,cloudcover:60},{precipitation:0.8,cloudcover:80},{precipitation:3.5,cloudcover:90}];
    var dd=["2026-07-03","2026-07-04","2026-07-05"];
    for (var d=0;d<dd.length;d++) for (var u=0;u<24;u++) weerData[dd[d]+"T"+(u<10?"0":"")+u+":00"]=types[(d*8+u)%4];
    btn.style.background="#f5c518"; btn.style.color="#7a6000"; btn.style.border="none";
  } else {
    weerData={};
    btn.style.background=""; btn.style.color=""; btn.style.border="";
  }
  if (data) renderTimetable();
}

function berekenWeer(datum,start,einde) {
  if (!datum||!start) return null;
  var bu=parseInt(start.split(":")[0]);
  var eu=parseInt((einde||start).split(":")[0]);
  if (isNaN(bu)) return null;
  if (isNaN(eu)||eu<bu) eu=bu+1;
  var tp=0,tc=0,n=0;
  for (var u=bu;u<=eu;u++) {
    var uu=u%24, dd=new Date(datum);
    if (u>=24) dd.setDate(dd.getDate()+1);
    var k=dd.toISOString().slice(0,10)+"T"+(uu<10?"0":"")+uu+":00";
    if (weerData[k]!==undefined){tp+=weerData[k].precipitation;tc+=weerData[k].cloudcover;n++;}
  }
  if (!n) return null;
  if (tp===0&&tc/n<30) return "zon";
  if (tp===0) return "bewolkt";
  if (tp<2) return "licht";
  return "zwaar";
}

function maakWeerIcoon(type) {
  if (type==="zon"||type==="bewolkt") { var s=document.createElement("span"); s.style.fontSize="16px"; s.textContent=type==="zon"?"☀️":"⛅"; return s; }
  var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.style.cssText="display:inline-block;vertical-align:middle;";
  if (type==="licht") {
    svg.setAttribute("width","16");svg.setAttribute("height","18");svg.setAttribute("viewBox","0 0 18 20");
    var p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d","M9 1C9 1 2 9 2 13.5C2 17.09 5.13 20 9 20C12.87 20 16 17.09 16 13.5C16 9 9 1 9 1Z");
    p.setAttribute("fill","#4a90e8");svg.appendChild(p);
  } else {
    svg.setAttribute("width","24");svg.setAttribute("height","18");svg.setAttribute("viewBox","0 0 26 20");
    var p1=document.createElementNS("http://www.w3.org/2000/svg","path");
    p1.setAttribute("d","M8 1C8 1 2 8.5 2 12.5C2 15.81 4.69 18.5 8 18.5C11.31 18.5 14 15.81 14 12.5C14 8.5 8 1 8 1Z");
    p1.setAttribute("fill","#4a90e8");p1.setAttribute("opacity","0.55");
    var p2=document.createElementNS("http://www.w3.org/2000/svg","path");
    p2.setAttribute("d","M18 1C18 1 12 8.5 12 12.5C12 15.81 14.69 18.5 18 18.5C21.31 18.5 24 15.81 24 12.5C24 8.5 18 1 18 1Z");
    p2.setAttribute("fill","#4a90e8");svg.appendChild(p1);svg.appendChild(p2);

  return svg;
}

function render() { renderHeader(); renderFilter(); renderTabs(); renderTimetable(); }

function renderHeader() {
  document.getElementById("meta-bijgewerkt").textContent = "Laatst bijgewerkt op "+fmtD(data.bijgewerktOp);
}

function renderFilter() {
  var fb=document.getElementById("filter-balk"); fb.innerHTML="";
  var lbl=document.createElement("span"); lbl.style.cssText="font-size:12px;color:var(--text-sec);"; lbl.textContent="Toon minimaal"; fb.appendChild(lbl);
  var balk=document.createElement("div"); balk.className="filter-ster-balk";
  for (var s=1;s<=5;s++) {
    (function(s){
      var st=document.createElement("span"); st.className="ster"+(filterMin>=s?" vol":""); st.textContent=filterMin>=s?"★":"☆";
      st.addEventListener("click",function(){filterMin=filterMin===s?0:s;renderFilter();renderTimetable();});
      balk.appendChild(st);
    })(s);
  }
  fb.appendChild(balk);
  var fr=document.getElementById("filter-rij2"); fr.innerHTML="";
  var lbl2=document.createElement("span"); lbl2.style.cssText="font-size:12px;color:var(--text-sec);"; lbl2.textContent="Commentaar bevat"; fr.appendChild(lbl2);
  var zoek=document.createElement("input"); zoek.type="text"; zoek.className="filter-zoek"; zoek.placeholder="Zoekwoord..."; zoek.value=filterWoord;
  zoek.addEventListener("blur",function(){filterWoord=zoek.value.trim().toLowerCase();renderTimetable();});
  zoek.addEventListener("keydown",function(e){if(e.key==="Enter")zoek.blur();});
  fr.appendChild(zoek);
}

function renderTabs() {
  var tabs=document.getElementById("tabs"); tabs.innerHTML="";
  for (var i=0;i<data.dagen.length;i++) {
    (function(i){
      var d=data.dagen[i], btn=document.createElement("button");
      btn.className="tab"+(i===actieveDag?" active":"");
      btn.innerHTML=d.dag+' <span style="opacity:.6;font-size:11px">('+d.acts.length+')</span>';
      btn.addEventListener("click",function(){actieveDag=i;renderTabs();renderTimetable();});
      tabs.appendChild(btn);
    })(i);
  }
}

function renderTimetable() {
  var tbody=document.getElementById("timetable-body"); tbody.innerHTML="";
  ["tijd","podium"].forEach(function(k){
    var ic=document.getElementById("icon-"+k); if(!ic)return;
    ic.textContent=sortKolom===k?(sortRichting==="asc"?"↑":"↓"):"↕";
    ic.style.opacity=sortKolom===k?"1":"0.3";
  });
  var dag=data.dagen[actieveDag], indices=[];
  for (var i=0;i<dag.acts.length;i++) {
    var a=dag.acts[i], hs=filterMin>0, hw=filterWoord!=="", toon;
    if (!hs&&!hw) toon=true;
    else if (hs&&hw) toon=(a.beoordeling||0)>=filterMin||(a.notitie||"").toLowerCase().indexOf(filterWoord)!==-1;
    else if (hs) toon=(a.beoordeling||0)>=filterMin;
    else toon=(a.notitie||"").toLowerCase().indexOf(filterWoord)!==-1;
    if (toon) indices.push(i);
  }
  indices.sort(function(ia,ib){
    var a=dag.acts[ia],b=dag.acts[ib],va,vb;
    if (sortKolom==="tijd"){va=tijdSort(a.start);vb=tijdSort(b.start);}
    else if (sortKolom==="podium"){va=a.podium;vb=b.podium;}
    else{va=a.beoordeling||0;vb=b.beoordeling||0;}
    if (va<vb)return sortRichting==="asc"?-1:1;
    if (va>vb)return sortRichting==="asc"?1:-1;
    return 0;
  });
  for (var ii=0;ii<indices.length;ii++) {
    (function(ai){
      var act=dag.acts[ai], kleur=PKL[act.podium]||"#888";
      var row=document.createElement("div"); row.className="row";
      var tijd=document.createElement("span"); tijd.className="col-tijd tijd"; tijd.textContent=act.start+(act.einde?" – "+act.einde:"");
      var badge=document.createElement("span"); badge.className="podium-badge"; badge.style.background=kleur+"33"; badge.style.color=kleur; badge.textContent=act.podium;
      var pw=document.createElement("span"); pw.className="col-podium"; pw.appendChild(badge);
      var wt=berekenWeer(act.datum,act.start,act.einde);
      if (wt) {
        var wl=document.createElement("a"); wl.href="https://www.buienradar.nl/weer/beuningen/nl/2758912"; wl.target="_blank"; wl.rel="noopener noreferrer";
        wl.style.cssText="display:inline-flex;align-items:center;text-decoration:none;line-height:1;"; wl.appendChild(maakWeerIcoon(wt)); pw.appendChild(wl);
      }
      var naam=document.createElement("a"); naam.className="naam-link col-naam"; naam.textContent=act.artiest;
      naam.href="https://open.spotify.com/search/"+encodeURIComponent(act.artiest); naam.target="_blank"; naam.rel="noopener noreferrer";
      var sterren=document.createElement("div"); sterren.className="sterren col-ster";
      for (var s=1;s<=5;s++) {
        (function(s){
          var st=document.createElement("span"); st.className="ster"+(act.beoordeling>=s?" vol":""); st.textContent=act.beoordeling>=s?"★":"☆";
          st.addEventListener("click",function(){dag.acts[ai].beoordeling=dag.acts[ai].beoordeling===s?null:s;data.bijgewerktOp=new Date().toISOString();slaOp();renderHeader();renderTimetable();});
          sterren.appendChild(st);
        })(s);
      }
      var nw=document.createElement("div"); nw.className="col-notitie";
      var ns=document.createElement("span"); ns.className="notitie-tekst"+(act.notitie?"":" leeg"); ns.textContent=act.notitie||"Notitie...";
      var ni=document.createElement("input"); ni.type="text"; ni.className="notitie-input"; ni.maxLength=35; ni.value=act.notitie; ni.style.display="none";
      ns.addEventListener("click",function(){ns.style.display="none";ni.style.display="block";ni.focus();});
      ni.addEventListener("blur",function(){dag.acts[ai].notitie=ni.value;data.bijgewerktOp=new Date().toISOString();slaOp();renderHeader();ns.textContent=ni.value||"Notitie...";ns.className="notitie-tekst"+(ni.value?"":" leeg");ni.style.display="none";ns.style.display="";});
      ni.addEventListener("keydown",function(e){if(e.key==="Enter")ni.blur();});
      nw.appendChild(ns);nw.appendChild(ni);
      var rs=document.createElement("div"); rs.className="row-sub"; rs.appendChild(sterren); rs.appendChild(nw);
      row.appendChild(tijd);row.appendChild(pw);row.appendChild(naam);row.appendChild(rs);
      tbody.appendChild(row);
    })(indices[ii]);
  }
}

document.querySelectorAll(".sortable").forEach(function(el){
  el.addEventListener("click",function(){
    var k=el.dataset.kolom;
    if (sortKolom===k) sortRichting=sortRichting==="asc"?"desc":"asc";
    else{sortKolom=k;sortRichting="asc";}
    renderTimetable();
  });
});
</script>
